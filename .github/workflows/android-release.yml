# Android Release Workflow
# Builds Android APK with Chinese localization

name: Android Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - feature/**
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2024.1.0)'
        required: false
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Build Release APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK for Release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ("${{ github.event.inputs.version }}") {
            $version = "${{ github.event.inputs.version }}" -replace '^v', ''
          }
          
          $apkPath = "apps/android/app/build/outputs/apk/release/app-release.apk"
          if (Test-Path $apkPath) {
            $newName = "linkclawcn-android-arm64-v8a-zh-$version.apk"
            Copy-Item $apkPath "./$newName"
            Write-Host "Created: $newName"
          } else {
            # Fallback to debug APK
            $debugApk = "apps/android/app/build/outputs/apk/debug/app-debug.apk"
            $newName = "linkclawcn-android-arm64-v8a-zh-$version-debug.apk"
            Copy-Item $debugApk "./$newName"
            Write-Host "Created debug APK: $newName"
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter "*.apk" | ForEach-Object {
            $sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$sha256  $($_.Name)" | Out-File -FilePath "sha256.txt" -Append -Encoding UTF8
          }
          Get-Content sha256.txt

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            linkclawcn-android-*.apk
            sha256.txt
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            linkclawcn-android-*.apk
            sha256.txt
          retention-days: 7
